name: Build and deploy Python app to Azure Web App - TheArchivistAI

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    defaults:
      run:
        working-directory: gom-ai

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Check Python version
        run: |
          python --version
          python -m pip --version

      - name: Create .env file from secrets
        run: |
          echo "GOOGLE_API_KEY=${{ secrets.GOOGLE_API_KEY }}" > .env
          echo "GROQ_API_KEY=${{ secrets.GROQ_API_KEY }}" >> .env
          echo "OPENAI_API_KEY=${{ secrets.OPENAI_API_KEY }}" >> .env
          echo "IMGBB_API_KEY=${{ secrets.IMGBB_API_KEY }}" >> .env
          echo "GOOGLE_LENS_HEADLESS=true" >> .env
          echo "BROWSERLESS_TOKEN=${{ secrets.BROWSERLESS_TOKEN }}" >> .env
          echo "GOOGLE_LENS_REMOTE_ONLY=true" >> .env
          echo ".env file created with $(wc -l < .env) lines"

      - name: Install dependencies for validation
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Validate FastAPI app import
        run: |
          python -c "from app.main import app; print('FastAPI app import OK:', app.title)"

      - name: Prepare deployment package
        run: |
          rm -rf ../python-app
          mkdir -p ../python-app
          cp -R app ../python-app/app
          cp requirements.txt .env ../python-app/
          find ../python-app -maxdepth 2 -type f | sort

      - name: Upload artifact for deployment job
        uses: actions/upload-artifact@v4
        with:
          name: python-app
          path: python-app

  deploy:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: read

    steps:
      - name: Download artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: python-app
          path: python-app

      - name: Inspect deployment package
        run: |
          find python-app -maxdepth 2 -type f | sort

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        id: deploy-to-webapp
        with:
          app-name: "TheArchivistAI"
          slot-name: "Production"
          publish-profile: ${{ secrets.AZUREAPPSERVICE_PUBLISH_PROFILE_AI }}
          package: python-app
